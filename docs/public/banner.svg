<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#21262d" />
    </pattern>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="blurple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7289DA" />
      <stop offset="100%" stop-color="#5865F2" />
    </linearGradient>
    <linearGradient id="violet-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5865F2" />
      <stop offset="100%" stop-color="#EB459E" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-grad)" />
  <rect width="1280" height="640" fill="url(#grid)" />

  <!-- Logo (Large, Top-left) -->
  <g transform="translate(140, 160) scale(0.35)">
    <path d="M120 80 L320 80 L220 280 L300 280 L160 460 L190 260 L120 260 Z" fill="url(#blurple-grad)" />
    <path d="M350 140 L440 140 L280 440 L230 440 Z" fill="url(#violet-grad)" />
  </g>

  <!-- Title -->
  <text x="140" y="420" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="96" letter-spacing="-3">
    <tspan fill="#e6edf3">Act</tspan><tspan fill="#5865F2">-Vite</tspan>
  </text>

  <!-- Tagline -->
  <text x="144" y="480" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="32" fill="#8b949e" letter-spacing="-0.5">
    Discord Activities, without the headache.
  </text>

  <!-- URL -->
  <text x="144" y="560" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="20" fill="#7289DA" letter-spacing="1">
    actvite.dev
  </text>

  <!-- Version Badge -->
  <g transform="translate(1000, 530)">
    <rect width="120" height="40" rx="8" fill="#5865F2" />
    <text x="60" y="26" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="18" fill="#ffffff" text-anchor="middle">v0.1.0</text>
  </g>

  <!-- Code Snippet Window (Right side) -->
  <g transform="translate(680, 140)">
    <!-- Editor Background -->
    <rect width="480" height="340" rx="12" fill="#161b22" stroke="#21262d" stroke-width="2" />
    
    <!-- macOS Buttons -->
    <circle cx="24" cy="24" r="6" fill="#ff5f57" />
    <circle cx="44" cy="24" r="6" fill="#febc2e" />
    <circle cx="64" cy="24" r="6" fill="#28c840" />
    
    <!-- Code Lines -->
    <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="16" letter-spacing="0">
      <text x="32" y="80">
        <tspan fill="#ff7b72">import</tspan> <tspan fill="#e6edf3">{ createActivity }</tspan> <tspan fill="#ff7b72">from</tspan> <tspan fill="#a5d6ff">'actvite'</tspan>
      </text>
      
      <text x="32" y="140">
        <tspan fill="#ff7b72">const</tspan> <tspan fill="#e6edf3">activity =</tspan> <tspan fill="#ff7b72">await</tspan> <tspan fill="#d2a8ff">createActivity</tspan><tspan fill="#e6edf3">({</tspan>
      </text>
      
      <text x="56" y="170">
        <tspan fill="#e6edf3">clientId:</tspan> <tspan fill="#79c0ff">env</tspan><tspan fill="#e6edf3">.</tspan><tspan fill="#79c0ff">DISCORD_CLIENT_ID</tspan><tspan fill="#e6edf3">,</tspan>
      </text>
      
      <text x="32" y="200" fill="#e6edf3">})</text>
      
      <text x="32" y="260">
        <tspan fill="#e6edf3">console.</tspan><tspan fill="#d2a8ff">log</tspan><tspan fill="#e6edf3">(activity.user.username)</tspan>
      </text>
    </g>
  </g>
</svg>
